services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticket_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ticket_analyzer

  backend:
    image: ${DOCKERHUB_USERNAME:-your-dockerhub-username}/ticket-analyzer-backend:${IMAGE_TAG:-v1}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:change-me@db:5432/ticket_db}
      MODEL_NAME: ${MODEL_NAME:-distilbert-base-uncased-finetuned-sst-2-english}
      SENTIMENT_MODEL: ${SENTIMENT_MODEL:-distilbert-base-uncased-finetuned-sst-2-english}
      HF_HOME: ${HF_HOME:-/opt/hf-cache}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - ticket_analyzer

  frontend:
    image: ${DOCKERHUB_USERNAME:-your-dockerhub-username}/ticket-analyzer-frontend:${IMAGE_TAG:-v1}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped
    networks:
      - ticket_analyzer

networks:
  ticket_analyzer:
    name: ticket_analyzer

volumes:
  postgres_data:
